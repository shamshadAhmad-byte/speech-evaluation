```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    width: 400px;
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.tabs {
    display: flex;
    margin-bottom: 20px;
}

.tabs button {
    flex: 1;
    padding: 12px;
    border: none;
    cursor: pointer;
    background: #eee;
    font-size: 16px;
    font-weight: bold;
}

.tabs button.active {
    background: #667eea;
    color: white;
}

.form {
    display: none;
}

.form.active {
    display: block;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #667eea;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

.btn:hover {
    opacity: 0.9;
}

.message {
    margin-top: 10px;
    text-align: center;
    color: green;
}
</style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Register</button>
    </div>

    <form id="loginForm" class="form active">
        <h2>Login</h2>

        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" required>
        </div>

        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>

    <form id="registerForm" class="form">
        <h2>Register</h2>

        <div class="input-group">
            <input type="text" id="registerName" placeholder="Full Name" autocomplete="name" required>
        </div>

        <div class="input-group">
            <input type="email" id="registerEmail" placeholder="Email" autocomplete="email" required>
        </div>

        <div class="input-group">
            <input type="password" id="registerPassword" placeholder="Password" autocomplete="new-password" required>
        </div>

        <button type="submit" class="btn">Create Account</button>
    </form>

    <div class="message" id="message"></div>
</div>

<script>
const loginTab = document.getElementById("loginTab");
const registerTab = document.getElementById("registerTab");

const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

const message = document.getElementById("message");

loginTab.addEventListener("click", () => {
    loginTab.classList.add("active");
    registerTab.classList.remove("active");

    loginForm.classList.add("active");
    registerForm.classList.remove("active");
});

registerTab.addEventListener("click", () => {
    registerTab.classList.add("active");
    loginTab.classList.remove("active");

    registerForm.classList.add("active");
    loginForm.classList.remove("active");
});

loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    try {
        const token = localStorage.getItem("token");
        const res = await fetch("https://speech-evaluation-qsxp.onrender.com/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if ( res.ok && data.token) {
            localStorage.setItem("token", data.token);
            message.textContent = "Login Successful!";
            loginForm.reset();
            window.location.href = "/speak-evaluation"; // Redirect to speak evaluation page after successful login
        } else {
            message.textContent = data.message;
        }
    } catch (err) {
        message.textContent = "Login Failed";
    }
});

registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("registerName").value;
    const email = document.getElementById("registerEmail").value;
    const password = document.getElementById("registerPassword").value;

    try {
        const res = await fetch("https://speech-evaluation-qsxp.onrender.com/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        message.textContent =
            data.message || "Registration Successful!";
            registerForm.reset();
            window.location.href = "/speak-evaluation"; // Redirect to login page after successful registration
    } catch (err) {
        message.textContent = "Registration Failed";
    }
});
</script>

</body>
</html>
